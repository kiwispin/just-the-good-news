<div id="search-overlay"
     hidden
     role="dialog"
     aria-modal="true"
     aria-label="Search articles"
     data-pagefind="{{ "pagefind/pagefind.js" | relURL }}">
  <div class="search-box">
    <div class="search-input-row">
      <svg class="search-icon-inline" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input"
             type="search"
             placeholder="Search good news…"
             autocomplete="off"
             spellcheck="false"
             aria-label="Search query">
      <button id="search-close" class="search-close-btn" aria-label="Close search">
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="search-results" role="list"></div>
    <p class="search-hint" id="search-hint">Type to search across all articles · <kbd>Esc</kbd> to close</p>
  </div>
</div>
