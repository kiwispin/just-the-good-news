baseURL = "https://justthegood.news/"
languageCode = "en-nz"
title = "Just The Good News"

[params]
  description = "Your daily dose of what's going right in the world"
  tagline = "Your daily dose of what's going right"
  author = "Just The Good News"

[taxonomies]
  category = "categories"
  region = "regions"

[outputs]
  home = ["HTML", "RSS"]

[markup.goldmark.renderer]
  unsafe = true

[sitemap]
  changefreq = "daily"
  priority   = 0.5
  filename   = "sitemap.xml"

[pagination]
  pagerSize = 12
