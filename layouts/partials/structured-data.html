{{ if and .IsPage (eq .Type "posts") }}
{{ $cat := index .Params.categories 0 | default "community" }}
{{ $imageURL := "" }}
{{ if .Params.image }}
  {{ $imageURL = .Params.image | absURL }}
{{ else }}
  {{ $imageURL = printf "images/placeholders/%s.svg" $cat | absURL }}
{{ end }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": {{ .Title | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "description": {{ (.Params.summary | default .Summary) | jsonify }},
  "url": {{ .Permalink | jsonify }},
  "image": {
    "@type": "ImageObject",
    "url": {{ $imageURL | jsonify }}
  },
  "author": {
    "@type": "Organization",
    "name": "Just The Good News",
    "url": "https://justthegood.news"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Just The Good News",
    "url": "https://justthegood.news",
    "logo": {
      "@type": "ImageObject",
      "url": "https://justthegood.news/images/logo.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
}
</script>
{{ end }}
