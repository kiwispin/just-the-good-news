name: Update Good News Content

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 UTC = 8pm NZST (UTC+12)
    - cron: '0 20 * * *'  # 20:00 UTC = 8am NZST
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit new articles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/pipeline.py --verbose

      - name: Check for new articles
        id: check-changes
        run: |
          git diff --quiet content/ data/ && echo "has_changes=false" >> $GITHUB_OUTPUT || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit new articles
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "Just The Good News Bot"
          git config user.email "bot@justthegoodnews.org"
          git add content/posts/ data/published_urls.json
          ARTICLE_COUNT=$(git diff --cached --name-only content/posts/ | wc -l | tr -d ' ')
          git commit -m "chore: add ${ARTICLE_COUNT} new good news article(s) [skip ci]"
          git push

      - name: Setup Hugo
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        if: steps.check-changes.outputs.has_changes == 'true'
        run: hugo --minify

      - name: Deploy to GitHub Pages
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Log — no new articles
        if: steps.check-changes.outputs.has_changes == 'false'
        run: echo "No new articles this run. All candidates were filtered or already published."
