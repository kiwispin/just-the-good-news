name: Update Good News Content

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 UTC = 8pm NZST (UTC+12)
    - cron: '0 20 * * *'  # 20:00 UTC = 8am NZST
  workflow_dispatch:        # Manual trigger button in GitHub UI
  push:
    branches: [main]        # Redeploy on every push (catches template/CSS fixes)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit new articles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run content pipeline
        if: github.event_name != 'push'   # Skip AI pipeline on code pushes (saves cost)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/pipeline.py --verbose

      - name: Commit new articles
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ data/published_urls.json static/images/
          git diff --cached --quiet || git commit -m "chore: add articles $(date -u +%Y-%m-%d) [skip ci]"

      - name: Push to main
        if: github.event_name != 'push'
        run: |
          git pull --rebase origin main || true
          git push origin main || true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Index site with Pagefind
        run: npx -y pagefind@latest --site public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
