<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#059669"/>
  <!-- Bar chart with upward trend -->
  <!-- Bar 1 (short) -->
  <rect x="300" y="270" width="40" height="60" rx="5" fill="white"/>
  <!-- Bar 2 (medium) -->
  <rect x="360" y="230" width="40" height="100" rx="5" fill="white"/>
  <!-- Bar 3 (tall) -->
  <rect x="420" y="180" width="40" height="150" rx="5" fill="white"/>
  <!-- Upward arrow on top of bar 3 -->
  <polygon points="440,145 460,180 420,180" fill="white"/>
  <!-- Baseline -->
  <rect x="285" y="328" width="200" height="7" rx="3" fill="white"/>
  <!-- Label -->
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="600" fill="white">Economy &amp; Work</text>
</svg>
