<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#8B5CF6"/>
  <!-- Scales of justice -->
  <!-- Central pole -->
  <rect x="396" y="150" width="8" height="155" rx="3" fill="white"/>
  <!-- Base -->
  <rect x="350" y="300" width="100" height="12" rx="6" fill="white"/>
  <!-- Crossbar -->
  <rect x="310" y="168" width="180" height="10" rx="5" fill="white"/>
  <!-- Left chain -->
  <line x1="330" y1="178" x2="330" y2="228" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="470" y1="178" x2="470" y2="228" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M300,228 Q330,248 360,228" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M440,228 Q470,248 500,228" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Label -->
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="600" fill="white">Justice &amp; Equality</text>
</svg>
