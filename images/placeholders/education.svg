<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#EC4899"/>
  <!-- Open book -->
  <!-- Left page -->
  <path d="M280,170 L280,300 Q340,290 400,300 L400,170 Q340,160 280,170 Z" fill="white"/>
  <!-- Right page -->
  <path d="M520,170 L520,300 Q460,290 400,300 L400,170 Q460,160 520,170 Z" fill="white"/>
  <!-- Spine -->
  <rect x="396" y="168" width="8" height="134" rx="2" fill="#EC4899"/>
  <!-- Book lines (left page) -->
  <line x1="300" y1="200" x2="390" y2="195" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="300" y1="220" x2="390" y2="215" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="300" y1="240" x2="390" y2="237" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="300" y1="260" x2="390" y2="258" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Book lines (right page) -->
  <line x1="500" y1="200" x2="410" y2="195" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="500" y1="220" x2="410" y2="215" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="500" y1="240" x2="410" y2="237" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <line x1="500" y1="260" x2="410" y2="258" stroke="#EC4899" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  <!-- Label -->
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="600" fill="white">Education</text>
</svg>
