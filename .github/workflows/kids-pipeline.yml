name: Kids Content Pipeline

on:
  schedule:
    # 22:00 UTC = 10am NZST. Deliberately offset from the main pipeline's
    # 20:00 UTC run so the two don't share the same Unsplash hourly quota
    # window (demo tier = 50 req/hour; ~18 images across both would exceed it).
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      reprocess_images:
        description: 'Reprocess images for all existing articles'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit new articles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run kids content pipeline
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gemini-3.5-flash' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          if [ "${{ inputs.reprocess_images }}" = "true" ]; then
            python scripts/pipeline-kids.py --reprocess-images --verbose
          else
            python scripts/pipeline-kids.py --verbose
          fi

      - name: Commit new kids articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/kids/ data/kids_published_urls.json static/images/kids/
          if [ "${{ inputs.reprocess_images }}" = "true" ]; then
            git diff --cached --quiet || git commit -m "chore: reprocess kids article images [skip ci]"
          else
            git diff --cached --quiet || git commit -m "chore: add kids articles $(date -u +%Y-%m-%d) [skip ci]"
          fi

      - name: Push to main
        run: |
          git pull --rebase origin main
          git push origin main

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Index site with Pagefind
        run: npx -y pagefind@latest --site public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
