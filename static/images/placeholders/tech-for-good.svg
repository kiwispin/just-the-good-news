<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#6366F1"/>
  <!-- Gear shape using a circle with teeth -->
  <circle cx="400" cy="220" r="45" fill="white"/>
  <circle cx="400" cy="220" r="22" fill="#6366F1"/>
  <!-- Gear teeth (rectangles rotated around center) -->
  <rect x="388" y="155" width="24" height="22" rx="4" fill="white"/>
  <rect x="388" y="267" width="24" height="22" rx="4" fill="white"/>
  <rect x="333" y="208" width="22" height="24" rx="4" fill="white"/>
  <rect x="445" y="208" width="22" height="24" rx="4" fill="white"/>
  <!-- Diagonal teeth -->
  <rect x="344" y="167" width="24" height="22" rx="4" fill="white" transform="rotate(45 356 178)"/>
  <rect x="432" y="167" width="24" height="22" rx="4" fill="white" transform="rotate(-45 444 178)"/>
  <rect x="344" y="255" width="24" height="22" rx="4" fill="white" transform="rotate(-45 356 266)"/>
  <rect x="432" y="255" width="24" height="22" rx="4" fill="white" transform="rotate(45 444 266)"/>
  <!-- Label -->
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="600" fill="white">Tech for Good</text>
</svg>
